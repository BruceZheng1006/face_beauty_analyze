<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Bias人脸分析工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .form-container {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 4px;
        }
        input[type="file"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #42b983;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #359469;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .result-container {
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f9f9f9;
            white-space: pre-wrap;
            font-size: 14px;
            max-height: 600px;
            overflow-y: auto;
        }
        .json-result {
            font-family: monospace;
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .analysis-section {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fafafa;
        }
        .analysis-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            color: #333;
        }
        .analysis-item {
            margin: 5px 0;
            padding: 5px;
            background-color: white;
            border-radius: 3px;
        }
    </style>
</head>
<body>
<h1>Bias人脸分析工具</h1>
<div class="form-container">
    <h3>选择本地的图片文件（支持jpg/jpeg/png）</h3>
    <div style="display: flex; align-items: center; gap: 10px;">
        <input type="file" id="fileInput" accept=".jpg,.jpeg,.png" style="flex: 1; min-width: 300px;">
    </div>
    <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
        <div style="margin: 0 10px;">
            <label for="genderSelect">选择性别：</label>
            <select id="genderSelect" style="padding: 5px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px;">
                <option value="male">男</option>
                <option value="female">女</option>
            </select>
        </div>
    </div>
    <div style="display: flex; justify-content: flex-start; margin-top: 20px;">
        <button id="analyzeBtn" onclick="uploadAndAnalyze()" style="white-space: nowrap;">上传并分析</button>
    </div>
</div>
<div class="result-container" id="result">🔍 选择图片后点击「上传并分析」，结果将显示在这里...</div>

<script>
    // 上传文件并调用后端接口
    function uploadAndAnalyze() {
        const fileInput = document.getElementById("fileInput");
        const resultDiv = document.getElementById("result");
        const analyzeBtn = document.getElementById("analyzeBtn");
        const file = fileInput.files[0];

        // 校验是否选择了文件
        if (!file) {
            resultDiv.innerHTML = "❌ 请先选择要上传的图片文件！";
            return;
        }

        // 显示确认弹窗
        showConfirmationModal(file, resultDiv, analyzeBtn);
    }
    
    // 显示确认弹窗
    function showConfirmationModal(file, resultDiv, analyzeBtn) {
        // 创建遮罩层
        const overlay = document.createElement('div');
        overlay.style.position = 'fixed';
        overlay.style.top = '0';
        overlay.style.left = '0';
        overlay.style.width = '100%';
        overlay.style.height = '100%';
        overlay.style.backgroundColor = 'rgba(0,0,0,0.5)';
        overlay.style.zIndex = '9998';
        
        // 创建弹窗容器
        const modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '50%';
        modal.style.left = '50%';
        modal.style.transform = 'translate(-50%, -50%)';
        modal.style.backgroundColor = 'white';
        modal.style.padding = '20px';
        modal.style.borderRadius = '8px';
        modal.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
        modal.style.zIndex = '9999';
        modal.style.maxWidth = '400px';
        modal.style.minWidth = '300px';
        
        // 弹窗内容
        modal.innerHTML = `
            <div style="margin-bottom: 15px;">
                <strong>隐私声明</strong>
            </div>
            <div style="margin-bottom: 15px; font-size: 14px; line-height: 1.4;">
                上传的图片分析时会暂时缓存，分析成功后立即删除。
            </div>
            <div style="text-align: right;">
                <button id="cancelBtn" style="padding: 8px 16px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;">取消</button>
                <button id="confirmBtn" style="padding: 8px 16px; background-color: #42b983; color: white; border: none; border-radius: 4px; cursor: pointer;">同意并上传</button>
            </div>
        `;
        
        // 添加到页面
        document.body.appendChild(overlay);
        document.body.appendChild(modal);
        
        // 取消按钮事件
        document.getElementById('cancelBtn').onclick = function() {
            document.body.removeChild(overlay);
            document.body.removeChild(modal);
            // 恢复按钮状态
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = "上传并分析";
        };
        
        // 确认按钮事件
        document.getElementById('confirmBtn').onclick = function() {
            // 移除弹窗
            document.body.removeChild(overlay);
            document.body.removeChild(modal);
            
            // 执行上传分析
            performUpload(file, resultDiv, analyzeBtn);
        };
    }
    
    // 执行上传分析
    function performUpload(file, resultDiv, analyzeBtn) {
        // 禁用按钮并显示加载状态
        analyzeBtn.disabled = true;
        analyzeBtn.textContent = "分析中...";
        resultDiv.innerHTML = "⏳ 正在分析中，请稍候...";

        // 构建FormData，用于上传文件
        const formData = new FormData();
        formData.append("file", file);
        
        // 获取性别选择
        const gender = document.getElementById("genderSelect").value;
        formData.append("gender", gender);

        // 发送POST请求上传文件并处理
        fetch("/analyze/upload", {
            method: "POST",
            body: formData
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = formatAnalysisResult(data.data);
                } else {
                    resultDiv.innerHTML = data.message || "❌ 分析失败";
                }
            })
            .catch(error => {
                resultDiv.innerHTML = "❌ 请求后端接口失败：" + error.message;
            })
            .finally(() => {
                // 恢复按钮状态
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = "上传并分析";
            });
    }

    // 格式化分析结果
    function formatAnalysisResult(jsonStr) {
        try {
            const data = JSON.parse(jsonStr);
            
            // 检查是否为空对象，表示未检测到人脸
            if (Object.keys(data).length === 0) {
                return `<div class="json-result"><div class="analysis-section"><div class="analysis-title">❌ 分析失败</div><div class="analysis-item">⚠️ 未检测到人脸</div></div></div>`;
            }
            
            let html = '<div class="json-result">';
            
            // 显示基本信息
            html += '<div class="analysis-section">';
            html += '<div class="analysis-title">📊 分析概览</div>';
            html += `<div class="analysis-item">📋 分析数据已加载</div>`;
            html += '</div>';
                            
            // 因为现在直接返回分析数据，所以使用data作为items
            for (const [section, items] of Object.entries(data)) {
                html += '<div class="analysis-section">';
                html += `<div class="analysis-title">📏 ${section}</div>`;
                
                for (const [key, value] of Object.entries(items)) {
                    html += `<div class="analysis-item">${key}: ${typeof value === 'number' ? value.toFixed(2) : value}</div>`;
                }
                html += '</div>';
            }
            
            // 移除原始输出显示部分，因为我们现在只返回分析数据
            html += '</div>';
            return html;
        } catch (e) {
            return `<div class="json-result">解析结果失败: ${e.message}</div>`;
        }
    }
</script>
<div style="margin-top: 20px; text-align: center; font-size: 12px; color: #999; padding: 20px;">
    公司宣传标语<br>
    未经许可，请勿抄袭
</div>
</body>
</html>
